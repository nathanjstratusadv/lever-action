name: Publish to winget
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish
        required: true
        type: string

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Install Inno Setup
        run: winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements; exit 0

      - name: Build PyInstaller package
        run: |
          uv run python generate_icon.py
          uv run pyinstaller lever_action.spec --clean -y

      - name: Build installer
        env:
          Version: ${{ github.event.inputs.version || github.event.release.tag_name }}
          DistDir: ${{ github.workspace }}\dist\lever_action
          ProjectDir: ${{ github.workspace }}
        run: |
          & iscc installer\setup.iss

      - name: Get installer hash
        id: hash
        run: |
          $hash = (Get-FileHash dist\LeverAction-Setup.exe -Algorithm SHA256).Hash.ToLower()
          echo "hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Create manifests
        env:
          VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
          HASH: ${{ steps.hash.outputs.hash }}
        run: |
          $dir = Join-Path 'manifests' (Join-Path 'n' (Join-Path 'NathanJohnson' (Join-Path 'LeverAction' $env:VERSION)))
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $ver = $env:VERSION.TrimStart('v')

          $verLines = @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json',
            '',
            "PackageIdentifier: NathanJohnson.LeverAction",
            "PackageVersion: $ver",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.12.0"
          )
          $verLines | Out-File (Join-Path $dir 'NathanJohnson.LeverAction.yaml') -Encoding utf8

          $instLines = @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json',
            '',
            "PackageIdentifier: NathanJohnson.LeverAction",
            "PackageVersion: $ver",
            "MinimumOSVersion: 10.0.0.0",
            "InstallerType: nullsoft",
            "Installers:",
            "  - Architecture: x64",
            "    InstallerUrl: https://github.com/nathan-johnson/lever-action/releases/download/$ver/LeverAction-Setup.exe",
            "    InstallerSha256: $env:HASH",
            "ManifestType: installer",
            "ManifestVersion: 1.12.0"
          )
          $instLines | Out-File (Join-Path $dir 'NathanJohnson.LeverAction.installer.yaml') -Encoding utf8

          $locLines = @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json',
            '',
            "PackageIdentifier: NathanJohnson.LeverAction",
            "PackageVersion: $ver",
            "PackageLocale: en-US",
            "Publisher: Nathan Johnson",
            "PublisherUrl: https://github.com/nathan-johnson/lever-action",
            "PackageName: LeverAction",
            "PackageUrl: https://github.com/nathan-johnson/lever-action",
            "License: MIT",
            "LicenseUrl: https://github.com/nathan-johnson/lever-action/blob/main/LICENSE",
            "ShortDescription: Native Windows AI chat web app",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.12.0"
          )
          $locLines | Out-File (Join-Path $dir 'NathanJohnson.LeverAction.locale.en-US.yaml') -Encoding utf8

      - name: Install wingetcreate
        run: winget install --id Microsoft.WingetCreate -e --accept-source-agreements --accept-package-agreements

      - name: Submit to winget-pkgs
        env:
          VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
          GITHUB_TOKEN: ${{ secrets.WINGET_PUBLISH_TOKEN }}
        run: |
          $dir = Join-Path 'manifests' (Join-Path 'n' (Join-Path 'NathanJohnson' (Join-Path 'LeverAction' $env:VERSION)))
          wingetcreate submit -t $env:GITHUB_TOKEN -n $dir